<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StockOps</title>

<style>
body { font-family: Arial; margin:0; background:#f4f4f4; }
header { background:#2c3e50; color:white; padding:15px; text-align:center; }
.container { padding:15px; }

input, button {
  width:100%;
  padding:12px;
  margin-top:8px;
  font-size:16px;
}

button {
  background:#27ae60;
  color:white;
  border:none;
}

.item {
  background:white;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
}
</style>
</head>

<body>

<header>📦 StockOps</header>

<div class="container">

<div id="login">
  <input id="username" placeholder="Ton prénom">
  <button onclick="start()">Entrer</button>
</div>

<div id="app" style="display:none">
  <h3 id="userLabel"></h3>

  <input id="name" placeholder="Nom produit">
  <input id="qty" type="number" placeholder="Quantité">
  <input id="min" type="number" placeholder="Seuil minimum">

  <button id="addBtn" onclick="addItem()">Ajouter</button>

  <h3>Stock</h3>
  <div id="list">Chargement...</div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, collection, addDoc, onSnapshot,
  deleteDoc, doc, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyAe4y0zXX8ASik1UvxMdPrRPl0KR7V8bys",
  authDomain: "stockopps-300ea.firebaseapp.com",
  projectId: "stockopps-300ea"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// STATE
let user = localStorage.getItem("user") || "";
let items = [];

// LOGIN
window.start = function(){
  const name = document.getElementById("username").value.trim();
  if(!name){ alert("Entre un prénom"); return; }

  user = name;
  localStorage.setItem("user", user);

  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
  document.getElementById("userLabel").innerText="👤 " + user;

  listen();
};

// AUTO LOGIN
if(user){
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
  document.getElementById("userLabel").innerText="👤 " + user;
  listen();
}

// SYNCHRO TEMPS RÉEL
function listen(){
  try{
    onSnapshot(collection(db,"items"), (snap)=>{
      items = snap.docs.map(d => ({id:d.id, ...d.data()}));
      render();
    }, (err)=>{
      alert("Erreur synchro: " + err.message);
    });
  }catch(e){
    alert("Erreur init Firebase: " + e.message);
  }
}

// AJOUT (ANTI-BLOCAGE)
window.addItem = async function(){

  const btn = document.getElementById("addBtn");

  const name = document.getElementById("name").value.trim();
  const qty = parseInt(document.getElementById("qty").value);
  const min = parseInt(document.getElementById("min").value);

  if(!name || isNaN(qty) || isNaN(min)){
    alert("Champs manquants");
    return;
  }

  btn.disabled = true;
  btn.innerText = "Envoi...";

  try{
    // timeout sécurité
    const timeout = new Promise((_, reject) =>
      setTimeout(() => reject(new Error("Timeout Firebase")), 7000)
    );

    const write = addDoc(collection(db,"items"),{
      name,
      qty,
      min,
      user,
      createdAt: serverTimestamp()
    });

    await Promise.race([write, timeout]);

    btn.innerText = "Ajouté ✓";

    document.getElementById("name").value="";
    document.getElementById("qty").value="";
    document.getElementById("min").value="";

  }catch(e){
    alert("Erreur Firebase:\n" + e.message);
    btn.innerText = "Erreur ❌";
  }

  btn.disabled = false;
};

// SUPPRESSION
window.del = async function(id){
  if(!confirm("Supprimer ?")) return;

  try{
    await deleteDoc(doc(db,"items",id));
  }catch(e){
    alert("Erreur suppression: " + e.message);
  }
};

// AFFICHAGE
function render(){
  const el = document.getElementById("list");

  if(items.length === 0){
    el.innerHTML = "Aucun stock";
    return;
  }

  el.innerHTML = items.map(i => `
    <div class="item">
      <b>${i.name}</b><br>
      Stock: ${i.qty} | Min: ${i.min}<br>
      <small>👤 ${i.user}</small><br>
      <button onclick="del('${i.id}')">Supprimer</button>
    </div>
  `).join("");
}

</script>

</body>
</html>
