<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Blog</title>
    <style>
        :root {
            --bg-color-light: #E8D5A4;
            --bg-color-medium: #F5E6D3;
            --bg-color-dark: #D4C4A8;
            --accent-color: #B89A5B;
        }
        body {
            background-color: var(--bg-color-light);
            color: black;
            font-family: Arial, sans-serif;
        }
        /* Other styles here */
    </style>
</head>
<body>
    <div id="articles"></div>
    <button onclick="addArticle()">Add Article</button>
    <script>
        let articles = [];

        // Load articles from localStorage
        function loadArticles() {
            const storedArticles = JSON.parse(localStorage.getItem('articles')) || [];
            articles = storedArticles;
            renderArticles();
        }

        // Save articles to localStorage
        function saveArticles() {
            localStorage.setItem('articles', JSON.stringify(articles));
        }

        // Render articles
        function renderArticles() {
            const articlesDiv = document.getElementById('articles');
            articlesDiv.innerHTML = '';
            articles.forEach((article, index) => {
                const articleDiv = document.createElement('div');
                articleDiv.textContent = article;
                const deleteButton = document.createElement('button');
                deleteButton.textContent = 'Delete';
                deleteButton.onclick = () => deleteArticle(index);
                articleDiv.appendChild(deleteButton);
                articlesDiv.appendChild(articleDiv);
            });
        }

        // Add an article
        function addArticle() {
            const articleText = prompt('Enter article content:');
            if (articleText) {
                articles.push(articleText);
                saveArticles();
                renderArticles();
            }
        }

        // Delete an article
        function deleteArticle(index) {
            articles.splice(index, 1);
            saveArticles();
            renderArticles();
        }

        // Initialize
        window.onload = loadArticles;
    </script>
</body>
</html>
