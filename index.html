<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StockOps</title>

<style>
body{
  font-family: Arial, sans-serif;
  margin:0;
  background:#f5f5f5;
}

header{
  background:#2c3e50;
  color:white;
  padding:15px;
  text-align:center;
}

.container{
  padding:15px;
}

input, button{
  padding:10px;
  margin:5px 0;
  width:100%;
  box-sizing:border-box;
}

button{
  background:#27ae60;
  color:white;
  border:none;
  cursor:pointer;
}

.item{
  background:white;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
}

</style>
</head>

<body>

<header>📦 StockOps</header>

<div class="container">

  <div id="login">
    <input id="username" placeholder="Ton prénom">
    <button onclick="start()">Entrer</button>
  </div>

  <div id="app" style="display:none">

    <h3 id="userLabel"></h3>

    <input id="name" placeholder="Nom produit">
    <input id="qty" type="number" placeholder="Quantité">
    <input id="min" type="number" placeholder="Seuil minimum">

    <button onclick="addItem()">Ajouter</button>

    <h3>Stock</h3>
    <div id="list"></div>

  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, collection, addDoc, onSnapshot,
  deleteDoc, doc, query, orderBy, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyAe4y0zXX8ASik1UvxMdPrRPl0KR7V8bys",
  authDomain: "stockopps-300ea.firebaseapp.com",
  projectId: "stockopps-300ea"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// STATE
let user = localStorage.getItem("user") || "";
let items = [];

// LOGIN
window.start = function(){
  const name = document.getElementById("username").value.trim();
  if(!name){
    alert("Entre un prénom");
    return;
  }

  user = name;
  localStorage.setItem("user", user);

  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "block";
  document.getElementById("userLabel").innerText = "👤 " + user;

  listen();
};

// AUTO LOGIN
if(user){
  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "block";
  document.getElementById("userLabel").innerText = "👤 " + user;
  listen();
}

// REALTIME SYNC
function listen(){
  try{
    const q = query(collection(db,"items"), orderBy("createdAt","desc"));

    onSnapshot(q, (snap)=>{
      items = snap.docs.map(d => ({id:d.id, ...d.data()}));
      render();
    }, (err)=>{
      alert("Erreur sync: " + err.message);
    });

  }catch(e){
    alert("Erreur init Firebase: " + e.message);
  }
}

// ADD
window.addItem = async function(){
  const name = document.getElementById("name").value.trim();
  const qty = parseInt(document.getElementById("qty").value);
  const min = parseInt(document.getElementById("min").value);

  if(!name || isNaN(qty) || isNaN(min)){
    alert("Champs manquants");
    return;
  }

  try{
    await addDoc(collection(db,"items"),{
      name,
      qty,
      min,
      user,
      createdAt: serverTimestamp()
    });

    document.getElementById("name").value="";
    document.getElementById("qty").value="";
    document.getElementById("min").value="";

  }catch(e){
    alert("Erreur ajout: " + e.message);
  }
};

// DELETE
window.del = async function(id){
  if(!confirm("Supprimer ?")) return;

  try{
    await deleteDoc(doc(db,"items",id));
  }catch(e){
    alert("Erreur suppression: " + e.message);
  }
};

// RENDER
function render(){
  const el = document.getElementById("list");

  if(items.length === 0){
    el.innerHTML = "Aucun stock";
    return;
  }

  el.innerHTML = items.map(i => `
    <div class="item">
      <b>${i.name}</b><br>
      Stock: ${i.qty} | Min: ${i.min}<br>
      <small>Ajouté par ${i.user}</small><br>
      <button onclick="del('${i.id}')">Supprimer</button>
    </div>
  `).join("");
}

</script>

</body>
</html>
